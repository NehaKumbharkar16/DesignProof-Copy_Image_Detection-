<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Background -->
  <rect width="800" height="450" fill="#F8FAFC"/>
  
  <!-- Sidebar -->
  <rect width="200" height="450" fill="#FFFFFF"/>
  <rect x="20" y="30" width="120" height="24" rx="4" fill="#E2E8F0"/>
  <rect x="20" y="80" width="160" height="12" rx="2" fill="#F1F5F9"/>
  <rect x="20" y="110" width="160" height="12" rx="2" fill="#F1F5F9"/>
  <rect x="20" y="140" width="160" height="12" rx="2" fill="#F1F5F9"/>
  
  <!-- Main Content Area -->
  <g transform="translate(240, 40)">
    <!-- Header -->
    <rect width="200" height="24" rx="4" fill="#CBD5E1"/>
    
    <!-- Stats Cards -->
    <g transform="translate(0, 50)">
      <!-- Card 1 -->
      <rect width="160" height="100" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
      <rect x="20" y="20" width="40" height="40" rx="20" fill="#DBEAFE"/>
      <rect x="20" y="70" width="80" height="12" rx="2" fill="#1E293B"/>
      
      <!-- Card 2 -->
      <rect x="180" y="0" width="160" height="100" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
      <rect x="200" y="20" width="40" height="40" rx="20" fill="#DCFCE7"/>
      <rect x="200" y="70" width="80" height="12" rx="2" fill="#1E293B"/>
      
      <!-- Card 3 -->
      <rect x="360" y="0" width="160" height="100" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
      <rect x="380" y="20" width="40" height="40" rx="20" fill="#FEE2E2"/>
      <rect x="380" y="70" width="80" height="12" rx="2" fill="#1E293B"/>
    </g>
    
    <!-- Chart Area -->
    <g transform="translate(0, 180)">
      <rect width="520" height="200" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
      <path d="M40 160 L100 120 L160 140 L220 80 L280 100 L340 40 L400 90 L460 60" stroke="#3B82F6" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M40 160 L100 120 L160 140 L220 80 L280 100 L340 40 L400 90 L460 60 V200 H40 Z" fill="url(#gradient)" opacity="0.2"/>
    </g>
  </g>
  
  <!-- Defs -->
  <defs>
    <filter id="shadow" x="-4" y="-4" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.05"/>
    </filter>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
