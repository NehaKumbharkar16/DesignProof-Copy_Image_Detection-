<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#f6f8fb"/>
      <stop offset="1" stop-color="#e9eff8"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Cables -->
  <g transform="translate(90,280)">
    <line x1="0" y1="0" x2="220" y2="-60" stroke="#9aa7b8" stroke-width="10" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="220" y2="-40" stroke="#7f8c9a" stroke-width="10" stroke-linecap="round"/>
    <!-- Disconnected ends -->
    <g transform="translate(220,-60)">
      <rect x="-6" y="-6" width="36" height="12" rx="3" fill="#222"/>
      <rect x="22" y="-8" width="10" height="16" rx="2" fill="#fff"/>
    </g>
    <g transform="translate(220,-40)">
      <rect x="-6" y="-6" width="36" height="12" rx="3" fill="#222"/>
      <rect x="22" y="-8" width="10" height="16" rx="2" fill="#fff"/>
    </g>
  </g>

  <!-- Fox -->
  <g transform="translate(480,200) scale(1.05)">
    <!-- Body -->
    <ellipse cx="0" cy="90" rx="80" ry="50" fill="#f48b2b"/>
    <!-- Head -->
    <path d="M-30,40 C-60,40 -80,0 -40,-20 C-10,-40 30,-20 40,0 C60,30 20,60 -10,60 C-25,62 -35,52 -30,40z" fill="#f48b2b"/>
    <!-- Ears -->
    <path d="M-28,20 L-48,-6 L-22,6 z" fill="#ffb86b"/>
    <path d="M36,12 L56,-14 L34,2 z" fill="#ffb86b"/>
    <!-- Face white -->
    <path d="M-8,10 C-2,22 10,28 24,10 C18,34 -4,34 -12,22 C-18,14 -8,10 -8,10z" fill="#fff"/>
    <!-- Eyes -->
    <circle cx="4" cy="12" r="3" fill="#222"/>
    <circle cx="-6" cy="12" r="3" fill="#222"/>
    <!-- Nose -->
    <circle cx="10" cy="26" r="3" fill="#000"/>
    <!-- Tail -->
    <path d="M-60,100 C-120,60 -140,20 -80,48 C-40,68 -10,92 -60,100z" fill="#f48b2b"/>
    <path d="M-70,92 C-104,74 -110,46 -80,52 C-62,56 -40,72 -70,92z" fill="#fff"/>

    <!-- Emotion: slightly puzzled gaze toward cables -->
    <path d="M24,8 C40,6 60,8 72,18" stroke="#333" stroke-width="2" fill="none" opacity="0.6"/>

    <!-- Small shadow -->
    <ellipse cx="0" cy="160" rx="120" ry="18" fill="#000" opacity="0.06"/>
  </g>

  <!-- Text -->
  <g transform="translate(60,50)">
    <text x="0" y="0" font-family="Segoe UI, Roboto, Arial" font-size="22" fill="#233">Unable to connect</text>
    <text x="0" y="28" font-family="Segoe UI, Roboto, Arial" font-size="14" fill="#566">Firefox can’t connect to the server at <tspan font-weight="bold">localhost:5173</tspan></text>
  </g>
</svg>